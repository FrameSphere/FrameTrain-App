name: Release Desktop App

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: FrameTrain Desktop App v${{ steps.get_version.outputs.version }}
          body: |
            ## FrameTrain Desktop App v${{ steps.get_version.outputs.version }}

            ### 🎉 Features
            - AI-powered local machine learning training
            - Multi-platform support (Windows, macOS, Linux)
            - Secure API-key authentication
            - Real-time training visualization
            - Dataset management

            ### 📦 Downloads
            Choose your platform below:
            - **Windows**: `.exe` installer
            - **macOS**: `.dmg` installer (Apple Silicon)
            - **Linux**: `.AppImage` (portable)

            ### 🔐 Installation
            1. Download the installer for your platform
            2. Install the application
            3. Log in with your API key from [frame-train.vercel.app](https://frame-train.vercel.app/dashboard)

            ### ⚠️ System Requirements
            - **Windows**: Windows 10/11 (64-bit)
            - **macOS**: macOS 11.0 or later (Apple Silicon)
            - **Linux**: Ubuntu 20.04 or later (or equivalent)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'

          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''

          - platform: 'windows-latest'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ✅ FIX: Kein working-directory - das Repo IS bereits der App-Ordner
      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ✅ FIX: Signing Keys für .sig Dateien
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ✅ FIX: Pfade ohne ./desktop-app2/ Prefix
      - name: Upload Release Assets (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ✅ FIX: Liest echte .sig Inhalte aus dem Release und baut latest.json korrekt
  generate-latest-json:
    needs: [build-tauri, create-release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files and generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="v${VERSION}"
          export PUB_DATE
          PUB_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          export VERSION TAG

          echo "Downloading .sig files for tag $TAG..."
          mkdir -p ./sigs
          gh release download "$TAG" --pattern "*.sig" --dir ./sigs 2>/dev/null \
            || echo "No .sig files found (signing key not configured)"

          echo "Downloaded sig files:"
          ls -la ./sigs/ 2>/dev/null || echo "(none)"

          # Read signature content into env vars
          export WIN_SIG="" MAC_ARM_SIG="" LINUX_SIG=""
          for f in ./sigs/*.exe.sig ./sigs/*.msi.sig; do
            [ -f "$f" ] && WIN_SIG=$(cat "$f") && echo "Windows sig: $f" && break
          done
          for f in ./sigs/*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_ARM_SIG=$(cat "$f") && echo "macOS ARM sig: $f" && break
          done
          for f in ./sigs/*.AppImage.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f") && echo "Linux sig: $f" && break
          done

          # Get download URLs via GitHub CLI
          echo "Fetching asset URLs from GitHub release..."
          ASSETS_JSON=$(gh release view "$TAG" --json assets --jq '.assets')
          echo "Assets: $ASSETS_JSON"

          export WIN_URL MAC_ARM_URL LINUX_URL
          WIN_URL=$(echo "$ASSETS_JSON" | jq -r '[.[] | select(.name | test("\\.exe$"; "i"))] | first | .browserDownloadUrl // ""')
          MAC_ARM_URL=$(echo "$ASSETS_JSON" | jq -r '[.[] | select(.name | test("\\.app\\.tar\\.gz$"; "i"))] | first | .browserDownloadUrl // ""')
          LINUX_URL=$(echo "$ASSETS_JSON" | jq -r '[.[] | select(.name | test("\\.AppImage$"; "i"))] | first | .browserDownloadUrl // ""')

          # Sanitize jq "null" strings
          [ "$WIN_URL" = "null" ]     && WIN_URL=""
          [ "$MAC_ARM_URL" = "null" ] && MAC_ARM_URL=""
          [ "$LINUX_URL" = "null" ]   && LINUX_URL=""

          # Fallback constructed URLs
          [ -z "$WIN_URL" ]     && WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/FrameTrain.2_${VERSION}_x64-setup.exe"
          [ -z "$MAC_ARM_URL" ] && MAC_ARM_URL="https://github.com/${REPO}/releases/download/${TAG}/FrameTrain.2_${VERSION}_aarch64.app.tar.gz"
          [ -z "$LINUX_URL" ]   && LINUX_URL="https://github.com/${REPO}/releases/download/${TAG}/FrameTrain.2_${VERSION}_amd64.AppImage"

          echo "WIN_URL:     $WIN_URL"
          echo "MAC_ARM_URL: $MAC_ARM_URL"
          echo "LINUX_URL:   $LINUX_URL"

          # Generate latest.json via standalone Python script (no heredoc = no YAML issues)
          python3 scripts/generate_latest_json.py

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-release:
    needs: [create-release, build-tauri, generate-latest-json]
    runs-on: ubuntu-latest

    steps:
      - name: Notify Success
        run: |
          echo "✅ Release v${{ needs.create-release.outputs.version }} erfolgreich!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
          echo "📦 Installer für alle Plattformen bereit!"
          echo "📄 latest.json mit echten Signaturen generiert!"
